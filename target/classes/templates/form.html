<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Demo</title>
</head>
<body>
    <h2>Form Example</h2>

    <!-- Form gửi POST đến /param/save/2021 -->
    <form action="/param/save/2021" method="post">
        <label for="y">Y value:</label>
        <input id="y" name="y" value="2031">
        <button type="submit">Save</button>
    </form>

    <h3>Kết quả:</h3>
    <ul>
        <li>X (path variable): <span th:text="${x}"></span></li>
        <li>Y (request param): <span th:text="${y}"></span></li>
    </ul>
</body>
</html>
